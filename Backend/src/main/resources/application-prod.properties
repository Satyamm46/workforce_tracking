# =========================================================
#  PRODUCTION PROFILE  (active in production)
#  ALL secrets come from environment variables — never
#  hardcoded. The ${VAR} syntax reads the OS environment.
# =========================================================

# ----- Database -----
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----- Hibernate -----
# DDL policy is env-driven so a brand-new managed DB (e.g. Railway) can be
# bootstrapped with 'update' on the first deploy, then tightened to 'validate'
# once the schema exists. Override via DDL_AUTO; defaults to the safe 'validate'.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ----- Connection pool (HikariCP — bundled with Spring Boot) -----
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ----- Logging (lean for production) -----
logging.level.root=WARN
logging.level.com.institute.workforce_tracking=INFO
logging.file.name=logs/workforce-tracking.log
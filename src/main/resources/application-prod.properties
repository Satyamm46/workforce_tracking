# =========================================================
#  PRODUCTION PROFILE  (active in production)
#  ALL secrets come from environment variables — never
#  hardcoded. The ${VAR} syntax reads the OS environment.
# =========================================================

# ----- Database -----
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----- Hibernate -----
# 'validate' = Hibernate checks the schema matches entities but NEVER
# alters the DB. Schema changes go through migrations (Flyway/Liquibase later).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ----- Connection pool (HikariCP — bundled with Spring Boot) -----
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ----- Logging (lean for production) -----
logging.level.root=WARN
logging.level.com.institute.workforce_tracking=INFO
logging.file.name=logs/workforce-tracking.log
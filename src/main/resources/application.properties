# =========================================================
#  BASE CONFIGURATION  (shared by every environment)
#  Environment-specific values live in application-dev /
#  application-prod and OVERRIDE the values here.
# =========================================================

# ----- Application identity -----
spring.application.name=workforce-tracking

# ----- Active profile -----
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ----- Server -----
server.port=8080
server.servlet.context-path=/api

# ----- Custom application banner -----
spring.banner.location=classpath:banner.txt

# =========================================================
#  JPA / HIBERNATE  (common behavior; ddl-auto set per profile)
# =========================================================
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# =========================================================
#  JACKSON (JSON serialization) — Jackson 3 compatible
# =========================================================
# Do not serialize null fields -> cleaner API responses
spring.jackson.default-property-inclusion=non_null
# Tolerate unknown JSON properties from clients
spring.jackson.deserialization.fail-on-unknown-properties=false

# =========================================================
#  TIME ZONE
# =========================================================
spring.jackson.time-zone=Asia/Kolkata

# =========================================================
#  JWT (placeholders — consumed by JwtUtil later)
# =========================================================
app.jwt.secret=${JWT_SECRET:CHANGE_ME_A_VERY_LONG_BASE64_SECRET_AT_LEAST_512_BITS}
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=604800000

# =========================================================
#  CORS (consumed by WebConfig later)
# =========================================================
app.cors.allowed-origins=http://localhost:5173

# =========================================================
#  MAIL (placeholders — real values per profile)
# =========================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =========================================================
#  ACTUATOR (health endpoint support)
# =========================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

management.health.mail.enabled=false

management.health.ssl.enabled=false

management.health.diskspace.threshold=1MB

# =========================================================
#  INITIAL DATA SEEDING (first Super Admin)
#  Overridden by environment variables in production.
# =========================================================
app.seed.super-admin.email=${SEED_ADMIN_EMAIL:superadmin@institute.com}
app.seed.super-admin.password=${SEED_ADMIN_PASSWORD:SuperAdmin@123}
app.seed.super-admin.full-name=${SEED_ADMIN_FULL_NAME:Super Administrator}

# =========================================================
#  LEAVE MANAGEMENT
# =========================================================
# Annual leave allowance in days, per employee, per calendar year.
app.leave.annual-allowance-days=24

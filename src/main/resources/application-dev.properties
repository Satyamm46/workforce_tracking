# =========================================================
#  DEVELOPMENT PROFILE  (active locally)
#  Loaded ON TOP of application.properties when profile=dev
# =========================================================

# ----- Database (local MySQL) -----
spring.datasource.url=jdbc:mysql://localhost:3306/workforce_tracking?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=Satyam231
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----- Hibernate -----
# 'update' auto-creates/updates tables as you develop. Convenient locally.
spring.jpa.hibernate.ddl-auto=update
# Print generated SQL to the console (learning + debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ----- Logging (verbose for development) -----
logging.level.root=INFO
logging.level.com.institute.workforce_tracking=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
